<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Messages - Travel App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Custom Configuration for consistent colors -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandBlue: "#3B82F6",
              lightGray: "#F3F4F6",
              textSecondary: "#6B7280",
              appBg: "#F8FAFC",
            },
          },
        },
      };
    </script>
    <!-- Custom Styles for UI Polish -->
    <style data-purpose="custom-layout">
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        background-color: #f8fafc;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      .status-bar-height {
        height: 44px; /* Standard iOS status bar height approximate */
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- BEGIN: Status Bar Space -->
    <div
      class="status-bar-height bg-white/80 backdrop-blur-md sticky top-0 z-50"
    >
      <div
        class="flex justify-between items-center px-6 pt-2 text-[11px] font-semibold"
      >
        <span>11:13 PM</span>
        <div class="flex items-center space-x-1">
          <svg class="w-3 h-3" fill="currentColor" viewbox="0 0 24 24">
            <path d="M12 21l-12-18h24z"></path>
          </svg>
          <svg class="w-3 h-3" fill="currentColor" viewbox="0 0 24 24">
            <path
              d="M13 2.5h-2v20h2V2.5z M17 7.5h-2v15h2V7.5z M21 12.5h-2v10h2V12.5z M9 12.5H7v10h2V12.5z M5 17.5H3v5h2V17.5z"
            ></path>
          </svg>
          <div class="border border-black rounded-sm px-0.5 text-[8px]">15</div>
        </div>
      </div>
    </div>
    <!-- END: Status Bar Space -->
    <!-- BEGIN: Header -->
    <header
      class="px-5 py-4 bg-white/80 backdrop-blur-md sticky top-[44px] z-50 flex justify-between items-center"
      data-purpose="main-header"
    >
      <div class="flex items-center">
        <h1 class="text-3xl font-bold text-gray-900">
          Messages<span class="text-yellow-400">.</span>
        </h1>
      </div>
      <div class="flex space-x-5 text-gray-700">
        <!-- Search/Archives Icon -->
        <button aria-label="Archive">
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewbox="0 0 24 24"
          >
            <path
              d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>
        <!-- Help/Headset Icon -->
        <button aria-label="Support">
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewbox="0 0 24 24"
          >
            <path
              d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.828-2.828.586-.586M5.636 5.636a9 9 0 000 12.728m0 0l2.829-2.829m-2.829 2.829L3 21M8.464 8.464a5 5 0 000 7.072l2.828-2.828-.586-.586"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>
      </div>
    </header>
    <!-- END: Header -->
    <!-- BEGIN: Main Content -->
    <main class="flex-1 pb-24">
      <!-- BEGIN: Quick Navigation -->
      <section class="bg-white px-5 py-6 shadow-sm mb-4">
        <div class="flex overflow-x-auto no-scrollbar space-x-6 items-start">
          <!-- Chats -->
          <div class="flex flex-col items-center min-w-[70px]">
            <div
              class="w-14 h-14 bg-cyan-100 rounded-2xl flex items-center justify-center text-cyan-600 mb-2"
            >
              <svg class="w-7 h-7" fill="currentColor" viewbox="0 0 24 24">
                <path
                  d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-medium text-gray-800">Chats</span>
          </div>
          <!-- Bookings -->
          <div class="flex flex-col items-center min-w-[70px]">
            <div
              class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 mb-2"
            >
              <svg class="w-7 h-7" fill="currentColor" viewbox="0 0 24 24">
                <path
                  d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zM7 12h5v5H7z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-medium text-gray-800">Bookings</span>
          </div>
          <!-- Trip Rewards -->
          <div class="flex flex-col items-center min-w-[70px] relative">
            <div
              class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-400 mb-2"
            >
              <div
                class="w-8 h-8 rounded-full border-2 border-orange-400 flex items-center justify-center font-bold text-lg"
              >
                T
              </div>
            </div>
            <span class="text-xs font-medium text-gray-800">Trip Rewards</span>
            <!-- Red dot badge -->
            <div
              class="absolute top-0 right-3 w-3 h-3 bg-orange-600 rounded-full border-2 border-white"
            ></div>
          </div>
          <!-- Promotions -->
          <div class="flex flex-col items-center min-w-[70px]">
            <div
              class="w-14 h-14 bg-pink-50 rounded-2xl flex items-center justify-center text-pink-400 mb-2"
            >
              <svg class="w-7 h-7" fill="currentColor" viewbox="0 0 24 24">
                <path
                  d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-medium text-gray-800">Promotions</span>
          </div>
          <!-- Activities -->
          <div class="flex flex-col items-center min-w-[70px] relative">
            <div
              class="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center text-blue-800 mb-2"
            >
              <div
                class="w-8 h-8 rounded-full border-2 border-blue-800 flex items-center justify-center bg-blue-100"
              >
                <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                  <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"></path>
                </svg>
              </div>
            </div>
            <span class="text-xs font-medium text-gray-800">Activities</span>
          </div>
        </div>
      </section>
      <!-- END: Quick Navigation -->
      <!-- BEGIN: Notifications Section -->
      <section class="px-5">
        <h2 class="text-sm font-semibold text-gray-500 mb-4">
          Recent notifications
        </h2>
        <!-- Membership Card -->
        <div
          class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden"
          data-purpose="notification-card"
        >
          <div class="p-4 flex items-start space-x-3">
            <!-- Silver Badge Icon -->
            <div class="mt-1">
              <div
                class="w-8 h-8 rounded-full bg-yellow-50 flex items-center justify-center ring-1 ring-yellow-200"
              >
                <span class="text-yellow-600 font-bold text-xs italic">T</span>
              </div>
            </div>
            <!-- Content -->
            <div class="flex-1">
              <h3 class="font-bold text-gray-900 leading-tight">
                Congratulations! You're now a Silver Member!
              </h3>
              <p class="text-sm text-gray-500 mt-1">
                Tap here to unlock your benefits!
              </p>
            </div>
          </div>
          <!-- Divider -->
          <div class="mx-4 border-t border-gray-50"></div>
          <!-- Card Footer -->
          <div class="px-4 py-3 flex justify-between items-center">
            <span class="text-xs text-gray-400">10:52 PM</span>
            <a
              class="text-blue-600 text-sm font-medium flex items-center"
              href="#"
            >
              View details
              <span class="ml-1 w-2 h-2 bg-orange-500 rounded-full"></span>
            </a>
          </div>
        </div>
        <!-- Footer Text -->
        <p class="text-center text-gray-400 text-xs mt-6">
          Notifications from the last 3 months
        </p>
      </section>
      <!-- END: Notifications Section -->
    </main>
    <!-- END: Main Content -->
    <!-- BEGIN: Bottom Navigation -->
    <footer
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe shadow-[0_-1px_10px_rgba(0,0,0,0.05)]"
      data-purpose="bottom-navigation"
    >
      <div class="flex justify-around items-center py-3">
        <!-- Home -->
        <a class="flex flex-col items-center text-gray-400" href="#">
          <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
          </svg>
          <span class="text-[10px] mt-1 font-medium">Home</span>
        </a>
        <!-- Messages (Active) -->
        <a class="flex flex-col items-center text-blue-600 relative" href="#">
          <div class="relative">
            <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
              <path
                d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-5H6V7h12v2z"
              ></path>
            </svg>
            <!-- Active Dot -->
            <div
              class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-orange-500 rounded-full border-2 border-white"
            ></div>
          </div>
          <span class="text-[10px] mt-1 font-bold">Messages</span>
        </a>
        <!-- Post -->
        <a class="flex flex-col items-center text-gray-400" href="#">
          <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"
            ></path>
          </svg>
          <span class="text-[10px] mt-1 font-medium">Post</span>
        </a>
        <!-- My Trips -->
        <a class="flex flex-col items-center text-gray-400" href="#">
          <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
            <path
              d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zM10 4h4v2h-4V4z"
            ></path>
          </svg>
          <span class="text-[10px] mt-1 font-medium">My Trips</span>
        </a>
        <!-- Account -->
        <a class="flex flex-col items-center text-gray-400" href="#">
          <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"
            ></path>
          </svg>
          <span class="text-[10px] mt-1 font-medium">Account</span>
        </a>
      </div>
      <!-- Android/iOS Home Indicator Line -->
      <div class="h-6 flex justify-center items-center">
        <div class="w-1/3 h-1 bg-gray-200 rounded-full"></div>
      </div>
    </footer>
    <!-- END: Bottom Navigation -->
  </body>
</html>
