              "surface-tint": "#c0c1ff",
              "on-secondary": "#003824",
              "secondary-fixed": "#6ffbbe",

              "on-primary-fixed": "#07006c",
              "on-primary-fixed-variant": "#2f2ebe",
              "surface-container-lowest": "#060e20",
              "tertiary-container": "#ca8100",
              "secondary-fixed-dim": "#4edea3",
              secondary: "#4edea3",
              outline: "#908fa0",

              "surface-container-high": "#222a3d",
              "error-container": "#93000a",
              "inverse-on-surface": "#283044",
              "inverse-primary": "#494bd6",
              primary: "#c0c1ff",
              "on-error-container": "#ffdad6",
              "inverse-surface": "#dae2fd",
              tertiary: "#ffb95f",
              "on-error": "#690005",
              background: "#0b1326",
              "surface-container": "#171f33",
              "primary-fixed-dim": "#c0c1ff",
              "primary-container": "#8083ff",
              "tertiary-fixed-dim": "#ffb95f",
              "tertiary-fixed": "#ffddb8",
              "on-background": "#dae2fd",
              "surface-bright": "#31394d",
              "on-tertiary-fixed": "#2a1700",
              "on-tertiary-container": "#3e2400",
              "on-secondary-fixed-variant": "#005236",
              error: "#ffb4ab",
            },
            borderRadius: {

              xl: "0.75rem",

            spacing: {

              "container-padding": "16px",

            fontSize: {

              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],

              ],
              "label-md": [

                {
                  lineHeight: "16px",

    </script>
    <style>
      body {
        background-color: #0b0e14;
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .otp-input:focus {
        box-shadow: 0 0 15px rgba(128, 131, 255, 0.4);
        border-color: #c0c1ff;
        outline: none;
      }
      .glow-button {
        background: linear-gradient(135deg, #8083ff 0%, #494bd6 100%);
        box-shadow: 0 4px 20px rgba(128, 131, 255, 0.3);
      }
      .glow-button:active {
        transform: scale(0.98);
      }
      .bg-mesh {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(73, 75, 214, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(0, 165, 114, 0.1) 0%,
            transparent 40%
          );
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="text-on-surface antialiased min-h-screen flex flex-col items-center"
  >
    <div class="bg-mesh"></div>
    <!-- Navigation Suppressed for Transactional OTP Flow as per Shell Visibility Rules -->
    <!-- Top Bar Component (Simplified for OTP Flow) -->
    <header
      class="fixed top-0 w-full z-50 flex items-center px-md h-16 bg-surface/70 backdrop-blur-lg border-b border-outline-variant/20 shadow-sm"
    >
      <button
        aria-label="Go back"
        class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant/50 active:scale-95 transition-all text-on-surface-variant"
      >
        <span class="material-symbols-outlined" data-icon="arrow_back"
          >arrow_back</span
        >
      </button>
      <div class="flex-grow flex justify-center pr-10">
        <span
          class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight"
          >Lumina</span
        >
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex flex-col items-center justify-center w-full max-w-md px-container-padding pt-24 pb-12"
    >
      <div
        class="glass-card w-full p-8 rounded-xl flex flex-col items-center text-center"
      >
        <!-- Icon Indicator -->
        <div
          class="w-16 h-16 rounded-2xl bg-primary-container/20 flex items-center justify-center mb-6 border border-primary/20"
        >
          <span
            class="material-symbols-outlined text-primary text-4xl"
            data-icon="lock_open"
            >lock_open</span
          >
        </div>
        <!-- Headlines -->
        <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">
          Verify OTP
        </h1>
        <p
          class="font-body-md text-body-md text-on-surface-variant mb-10 max-w-[280px]"
        >
          Enter the 4-digit code sent to
          <span class="text-primary font-medium">admin@luminahotels.com</span>
        </p>
        <!-- OTP Input Fields -->
        <div class="flex gap-4 mb-10 justify-center">
          <input
            autofocus=""
            class="otp-input w-16 h-20 bg-surface-container-lowest text-on-surface text-display-lg text-center font-bold rounded-xl border border-outline-variant/30 transition-all duration-300"
            maxlength="1"
            type="text"
          />
          <input
            class="otp-input w-16 h-20 bg-surface-container-lowest text-on-surface text-display-lg text-center font-bold rounded-xl border border-outline-variant/30 transition-all duration-300"
            maxlength="1"
            type="text"
          />
          <input
            class="otp-input w-16 h-20 bg-surface-container-lowest text-on-surface text-display-lg text-center font-bold rounded-xl border border-outline-variant/30 transition-all duration-300"
            maxlength="1"
            type="text"
          />
          <input
            class="otp-input w-16 h-20 bg-surface-container-lowest text-on-surface text-display-lg text-center font-bold rounded-xl border border-outline-variant/30 transition-all duration-300"
            maxlength="1"
            type="text"
          />
        </div>
        <!-- Primary Action -->
        <button
          class="glow-button w-full h-14 rounded-xl text-on-primary font-headline-sm text-headline-sm transition-all flex items-center justify-center gap-2 mb-6"
        >
          Verify &amp; Proceed
          <span
            class="material-symbols-outlined text-xl"
            data-icon="arrow_forward"
            >arrow_forward</span
          >
        </button>
        <!-- Resend Logic -->
        <div class="flex flex-col items-center gap-2">
          <p class="font-body-sm text-body-sm text-on-surface-variant">
            Didn't receive the code?
          </p>
          <div class="flex items-center gap-2">
            <button
              class="text-primary font-label-md text-label-md hover:underline opacity-50 cursor-not-allowed transition-all"
              disabled=""
              id="resendBtn"
            >
              Resend Code
            </button>
            <span
              class="text-secondary font-label-md text-label-md bg-secondary/10 px-2 py-0.5 rounded-full"
              id="timer"
              >00:59</span
            >
          </div>
        </div>
      </div>
      <!-- Decorative Security Badge -->
      <div
        class="mt-12 flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant/20 bg-surface-container-low/50"
      >
        <span
          class="material-symbols-outlined text-sm text-secondary"
          data-icon="verified_user"
          >verified_user</span
        >
        <span class="font-label-sm text-label-sm text-on-surface-variant"
          >Secure AES-256 encrypted verification</span
        >
      </div>
    </main>
    <!-- Visual Atmosphere: Ambient Glows -->
    <div
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"
    ></div>
    <script>
      // OTP Focus Management
      const inputs = document.querySelectorAll(".otp-input");
      inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          if (e.target.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });

      // Countdown Timer Logic
      let timeLeft = 59;
      const timerDisplay = document.getElementById("timer");
      const resendBtn = document.getElementById("resendBtn");

      const countdown = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(countdown);
          timerDisplay.style.display = "none";
          resendBtn.classList.remove("opacity-50", "cursor-not-allowed");
          resendBtn.disabled = false;
          resendBtn.classList.add("opacity-100");
        } else {
          let seconds = timeLeft < 10 ? "0" + timeLeft : timeLeft;
          timerDisplay.textContent = `00:${seconds}`;
          timeLeft--;
        }
      }, 1000);

      // Simple input restriction
      inputs.forEach((input) => {
        input.addEventListener("keypress", (e) => {
          if (!/[0-9]/.test(e.key)) {
            e.preventDefault();
          }
        });
      });
    </script>
  </body>
</html>
