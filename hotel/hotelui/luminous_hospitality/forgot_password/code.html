<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#2d3449",
              "on-surface-variant": "#c7c4d7",
              "primary-fixed": "#e1e0ff",
              "on-tertiary": "#472a00",
              "surface-dim": "#0b1326",
              "on-surface": "#dae2fd",
              surface: "#0b1326",
              "secondary-container": "#00a572",
              "on-tertiary-fixed-variant": "#653e00",
              "on-primary-container": "#0d0096",
              "on-primary": "#1000a9",
              "surface-container-low": "#131b2e",
              "surface-tint": "#c0c1ff",
              "on-secondary": "#003824",
              "secondary-fixed": "#6ffbbe",
              "on-secondary-container": "#00311f",
              "on-primary-fixed": "#07006c",
              "on-primary-fixed-variant": "#2f2ebe",
              "surface-container-lowest": "#060e20",
              "tertiary-container": "#ca8100",
              "secondary-fixed-dim": "#4edea3",
              secondary: "#4edea3",
              outline: "#908fa0",
              "outline-variant": "#464554",
              "on-secondary-fixed": "#002113",
              "surface-variant": "#2d3449",
              "surface-container-high": "#222a3d",
              "error-container": "#93000a",
              "inverse-on-surface": "#283044",
              "inverse-primary": "#494bd6",
              primary: "#c0c1ff",
              "on-error-container": "#ffdad6",
              "inverse-surface": "#dae2fd",
              tertiary: "#ffb95f",
              "on-error": "#690005",
              background: "#0b1326",
              "surface-container": "#171f33",
              "primary-fixed-dim": "#c0c1ff",
              "primary-container": "#8083ff",
              "tertiary-fixed-dim": "#ffb95f",
              "tertiary-fixed": "#ffddb8",
              "on-background": "#dae2fd",
              "surface-bright": "#31394d",
              "on-tertiary-fixed": "#2a1700",
              "on-tertiary-container": "#3e2400",
              "on-secondary-fixed-variant": "#005236",
              error: "#ffb4ab",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "card-gap": "12px",
              xs: "8px",
              "container-padding": "16px",
              md: "16px",
              xl: "32px",
              sm: "12px",
              lg: "24px",
              base: "4px",
            },
            fontFamily: {
              "headline-sm": ["Inter"],
              "body-sm": ["Inter"],
              "body-lg": ["Inter"],
              "label-sm": ["Inter"],
              "headline-md": ["Inter"],
              "label-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg": ["Inter"],
              "display-lg": ["Inter"],
            },
            fontSize: {
              "headline-sm": [
                "16px",
                { lineHeight: "24px", fontWeight: "600" },
              ],
              "body-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-sm": ["10px", { lineHeight: "12px", fontWeight: "600" }],
              "headline-md": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
              "label-md": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.02em",

                },
              ],
              "headline-lg-mobile": [
                "20px",
                { lineHeight: "28px", fontWeight: "700" },
              ],
              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "headline-lg": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "display-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0b1326;
        color: #dae2fd;
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(144, 143, 160, 0.2);
      }
      .purple-gradient {
        background: linear-gradient(135deg, #8083ff 0%, #494bd6 100%);
        box-shadow: 0 4px 15px rgba(128, 131, 255, 0.3);
      }
      .purple-gradient:active {
        transform: scale(0.98);
      }
      .glow-input:focus-within {
        box-shadow:
          0 0 0 1px #c0c1ff,
          0 0 12px rgba(192, 193, 255, 0.2);
        border-color: #c0c1ff;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .floating-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(128, 131, 255, 0.15) 0%,
          transparent 70%
        );
        z-index: -1;
        filter: blur(40px);
        animation: float 20s infinite alternate ease-in-out;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(50px, 100px);
        }
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-center relative px-container-padding py-xl"
  >
    <!-- Atmospheric background effects -->
    <div class="floating-orb top-[-100px] right-[-100px]"></div>
    <div
      class="floating-orb bottom-[-50px] left-[-50px]"
      style="
        animation-delay: -10s;
        background: radial-gradient(
          circle,
          rgba(78, 222, 163, 0.1) 0%,
          transparent 70%
        );
      "
    ></div>
    <!-- Top Navigation Anchor (Manual implementation of TopAppBar style for transactional screen) -->
    <header class="fixed top-0 left-0 w-full flex items-center h-16 px-md z-50">
      <button
        aria-label="Go back"
        class="p-2 rounded-full hover:bg-surface-variant/30 transition-colors active:scale-95 flex items-center justify-center text-on-surface"
        onclick="history.back()"
      >
        <span class="material-symbols-outlined" style="font-size: 24px"
          >arrow_back</span
        >
      </button>
    </header>
    <main
      class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700"
    >
      <!-- Security Illustration -->
      <div class="flex justify-center mb-xl">
        <div class="relative w-48 h-48 md:w-56 md:h-56">
          <div
            class="absolute inset-0 bg-primary/10 rounded-full animate-pulse blur-2xl"
          ></div>
          <img
            alt="Security Illustration"
            class="w-full h-full object-contain relative z-10 drop-shadow-[0_0_20px_rgba(192,193,255,0.4)]"
            data-alt="A sophisticated high-tech 3D security illustration featuring a translucent glass shield glowing with indigo neon circuits. Behind the shield, a metallic key sits on a bed of dark midnight blue quartz. The scene is illuminated by soft volumetric lighting and a vibrant indigo aura, suggesting premium protection and digital safety for a luxury hospitality platform."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAj6tQuOgB92CzI_wmPjUSuPKehd_z8MdFOZPpN_TLXnQ_nTBnNzmGI1GB_tbF2M2tLFFlOWJc4lSICpJ_nwhcj0Ok_l--ELwoWy1SeceV6AUWxP8EFWvrkAQb7AW0rfCrXsd2Man6xOpnji8DIWEpDypa6TRBFzJgsXAWALkpQI-9VFZEqrTXCHJEvF7l3ATQab9IFHYgx_Cfhrlj6447RmUcXHst0jfpP-AjfjaKRPI-3h_RmTN4MngVdPlLnT5IkhcNFornLM1E"
          />
        </div>
      </div>
      <!-- Glassmorphic Content Card -->
      <div class="glass-card rounded-xl p-lg flex flex-col gap-lg">
        <div class="text-center">
          <h1
            class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs"
          >
            Forgot Password?
          </h1>
          <p
            class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto"
          >
            Enter your email address to receive a verification code
          </p>
        </div>
        <!-- Form -->
        <form
          class="flex flex-col gap-lg"
          id="forgotForm"
          onsubmit="return handleSubmit(event);"
        >
          <div class="flex flex-col gap-xs">
            <label
              class="font-label-md text-label-md text-on-surface-variant ml-1"
              for="email"
              >Email Address</label
            >
            <div
              class="glow-input group flex items-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-md h-12 transition-all"
            >
              <span
                class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors mr-md"
                style="font-size: 20px"
                >mail</span
              >
              <input
                class="bg-transparent border-none outline-none ring-0 w-full font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0"
                id="email"
                name="email"
                placeholder="manager@lumina-hotels.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <button
            class="purple-gradient h-12 rounded-lg font-headline-sm text-headline-sm text-white flex items-center justify-center transition-all duration-300"
            id="submitBtn"
            type="submit"
          >
            <span id="btnText">Send Code</span>
            <div
              class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"
              id="loader"
            ></div>
          </button>
        </form>
        <!-- Success Feedback (Hidden by default) -->
        <div
          class="hidden text-center animate-in fade-in zoom-in duration-500"
          id="successMessage"
        >
          <div class="flex items-center justify-center text-secondary mb-xs">
            <span
              class="material-symbols-outlined mr-xs"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >check_circle</span
            >
            <span class="font-label-md text-label-md"
              >Code sent successfully</span
            >
          </div>
        </div>
      </div>
      <!-- Help Link -->
      <div class="mt-lg text-center">
        <p class="font-body-sm text-body-sm text-on-surface-variant">
          Need more help?
          <a class="text-primary font-semibold hover:underline" href="#"
            >Contact Support</a
          >
        </p>
      </div>
    </main>
    <script>
      function handleSubmit(event) {
        event.preventDefault();
        const btn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");
        const success = document.getElementById("successMessage");

        // Visual feedback loop
        btn.disabled = true;
        btnText.textContent = "Processing";
        loader.classList.remove("hidden");

        // Mock API delay
        setTimeout(() => {
          loader.classList.add("hidden");
          btnText.textContent = "Code Sent";
          btn.classList.replace("purple-gradient", "bg-secondary-container");
          btn.style.boxShadow = "0 0 15px rgba(0, 165, 114, 0.3)";
          success.classList.remove("hidden");

          // Trigger a slight haptic-like shake or pulse
          btn.animate(
            [
              { transform: "scale(1)" },
              { transform: "scale(1.02)" },
              { transform: "scale(1)" },
            ],
            { duration: 300 },
          );
        }, 1800);

        return false;
      }

      // Add a subtle parallax effect to the illustration based on mouse move
      document.addEventListener("mousemove", (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) / 50;
        const moveY = (e.clientY - window.innerHeight / 2) / 50;
        const illustration = document.querySelector("img[data-alt]");
        if (illustration) {
          illustration.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }
      });
    </script>
  </body>
</html>
